name: build-engine-pack

# Builds the on-device engine-pack (self-contained `stom-engine` CLI bundling
# torch CPU + nnU-Net + the segmentation weights) on a Windows runner and
# publishes the zip + manifest to a DEDICATED, fixed `engine` prerelease.
#
# Decoupled from client releases ON PURPOSE: this runs only on manual dispatch,
# NOT on v* tags. Client (v*) releases rebuild only the installer, so a
# client-only update never republishes the ~1.3 GB engine-pack and users do not
# re-download it. Run this workflow only when the engine itself changes (engine
# code, nnU-Net, or the weights), passing the new engine `version`. The `engine`
# release is marked prerelease so it never becomes GitHub's "latest" and shadows
# the client installer release that the client auto-updater looks for.
#
# REQUIRES repository variable WEIGHTS_URL: a direct download for the
# DentalSegmentator weights archive (the Dataset112_* folder). ~236 MB, not in git.
#
# OPTIONAL repository variable TF2_WEIGHTS_URL: a direct download for the 49-class
# ToothFairy2 per-tooth model archive (a top-level Dataset112_ToothFairy2/ folder,
# flat nnU-Net layout). When set, the per-tooth model (~781 MB, CC BY-SA 4.0 — see
# NOTICE) is bundled into the same pack and listed in the manifest's "models".
# When unset, a DentalSegmentator-only pack is built (no size increase).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Engine version label for the manifest (e.g. v0.4.1)"
        required: true
        default: "engine"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + inference stack + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[nnunet]" pyinstaller
          pip install scikit-image

      - name: Fetch model weights
        shell: pwsh
        env:
          WEIGHTS_URL: ${{ vars.WEIGHTS_URL }}
        run: |
          if (-not $env:WEIGHTS_URL) {
            throw "Set repository variable WEIGHTS_URL to the DentalSegmentator weights archive URL."
          }
          New-Item -ItemType Directory -Force -Path models | Out-Null
          Invoke-WebRequest -Uri $env:WEIGHTS_URL -OutFile weights.zip
          Expand-Archive -Path weights.zip -DestinationPath models -Force
          if (-not (Test-Path "models/Dataset112_DentalSegmentator_v100")) {
            throw "Weights archive did not contain models/Dataset112_DentalSegmentator_v100"
          }

      - name: Fetch ToothFairy2 weights (optional)
        shell: pwsh
        env:
          TF2_WEIGHTS_URL: ${{ vars.TF2_WEIGHTS_URL }}
        run: |
          # Optional: when TF2_WEIGHTS_URL is set, bundle the 49-class per-tooth
          # ToothFairy2 model too. The archive must contain a top-level
          # Dataset112_ToothFairy2/ folder laid out as a flat nnU-Net model
          # (dataset.json + plans.json + fold_0/checkpoint_best.pth). CC BY-SA 4.0
          # (see NOTICE). Unset => DentalSegmentator-only pack (no 781 MB add).
          if (-not $env:TF2_WEIGHTS_URL) {
            Write-Host "TF2_WEIGHTS_URL not set - skipping ToothFairy2 (DentalSegmentator-only pack)."
            exit 0
          }
          Invoke-WebRequest -Uri $env:TF2_WEIGHTS_URL -OutFile tf2-weights.zip
          Expand-Archive -Path tf2-weights.zip -DestinationPath models -Force
          if (-not (Test-Path "models/Dataset112_ToothFairy2/dataset.json")) {
            throw "TF2 archive did not contain models/Dataset112_ToothFairy2/dataset.json (expected a flat nnU-Net model under Dataset112_ToothFairy2/)"
          }
          if (-not (Test-Path "models/Dataset112_ToothFairy2/fold_0/checkpoint_best.pth")) {
            throw "TF2 archive missing models/Dataset112_ToothFairy2/fold_0/checkpoint_best.pth"
          }

      - name: Build engine-pack with PyInstaller
        working-directory: packaging
        run: pyinstaller stom-engine.spec --noconfirm

      - name: Zip engine-pack + write manifest
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $zip = "stom-engine-pack-win64.zip"
          Compress-Archive -Path packaging/dist/stom-engine/* -DestinationPath $zip -Force
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          # The zip is hosted on the fixed `engine` release, so the URL is stable
          # across client releases (the whole point of decoupling).
          $url = "https://github.com/${env:GITHUB_REPOSITORY}/releases/download/engine/$zip"
          # Record which models are bundled so the manifest is self-describing.
          # Detect ToothFairy2 from the source models/ tree the spec bundles from
          # (robust: PyInstaller's onedir layout nests datas under _internal/).
          $models = @("dentalsegmentator")
          if (Test-Path "models/Dataset112_ToothFairy2/fold_0/checkpoint_best.pth") {
            $models += "toothfairy2"
          }
          @{ version = $version; url = $url; sha256 = $sha; models = $models } | ConvertTo-Json | Out-File -Encoding ascii engine-pack-manifest.json
          Get-Content engine-pack-manifest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: engine-pack
          path: |
            stom-engine-pack-win64.zip
            engine-pack-manifest.json

      - name: Publish to the fixed `engine` prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: engine
          name: "Engine pack (on-device segmentation models)"
          prerelease: true
          make_latest: false
          files: |
            stom-engine-pack-win64.zip
            engine-pack-manifest.json
